<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Ranks</title>
    <link rel="icon" href="Crystal Ranks.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080810; --card: #0f0f1a; --border: #1e1e2e; --text: #e8e8f0; --text-dim: #6b6b8a; --purple: #c026d3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 0 16px 40px; display: flex; flex-direction: column; align-items: center; }
        .site-header { text-align: center; padding: 30px 0 15px; width: 100%; max-width: 500px; }
        .site-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 7vw, 4.5rem); letter-spacing: 3px; background: linear-gradient(135deg, #e040fb, #7c3aed, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .discord-links { margin-top: 10px; display: flex; gap: 15px; justify-content: center; }
        .discord-links a { color: #5865f2; text-decoration: none; font-weight: 600; font-size: 14px; }
        .search-bar { width: 100%; max-width: 500px; margin-bottom: 12px; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 14px; outline: none; }
        .stats-info { width: 100%; max-width: 500px; display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; padding: 0 5px; }
        .card { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .lb-list { padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .lb-row { display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; cursor: pointer; transition: 0.2s; }
        .lb-row:hover { border-color: var(--purple); background: rgba(192,38,211,0.05); }
        .row-main { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #333; }
        .lb-name { font-weight: 700; font-size: 14px; }
        .streak { color: #fbbf24; font-size: 11px; font-weight: bold; }
        .lb-badge { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; margin-top: 3px; display: inline-block; }
        .lb-elo { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; text-align: right; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 20px; width: 90%; max-width: 320px; padding: 30px 20px; text-align: center; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: var(--text-dim); }
        .modal-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--purple); margin-bottom: 12px; }
        .m-username { color: var(--text-dim); font-size: 13px; margin-bottom: 15px; display: block; }
        .m-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; background: #080810; padding: 15px; border-radius: 12px; font-size: 14px; }
    </style>
</head>
<body>

<header class="site-header">
    <h1>Crystal Ranks</h1>
    <div class="discord-links">
        <a href="https://discord.gg/W25p9CWHfx" target="_blank">🔗 Crystallized Competitive</a>
        <a href="https://discord.gg/xVfQxdGhsQ" target="_blank">🔗 Ciibr Studios</a>
    </div>
</header>

<input type="text" id="search" class="search-bar" placeholder="Search players..." onkeyup="filterLeaderboard()">

<div class="stats-info">
    <span id="p-count">0 Players</span>
    <span id="last-update">Updating...</span>
</div>

<div class="card">
    <div class="lb-list" id="lb-list">
        <div style="text-align:center; padding:40px; color:#666;">Loading...</div>
    </div>
</div>

<div class="modal" id="profile-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="m-avatar" class="modal-avatar" src="">
        <h2 id="m-name"></h2>
        <span id="m-username" class="m-username"></span>
        <div class="m-stat-grid">
            <div>ELO: <strong id="m-elo" style="color:var(--purple)"></strong></div>
            <div>Rank: <strong id="m-rank"></strong></div>
            <div>Streak: <strong id="m-streak"></strong></div>
            <div>Pos: <strong id="m-pos"></strong></div>
        </div>
    </div>
</div>

<script>
let allPlayers = [];
function getRank(elo, players = []) {
    const sorted = [...players].map(p => p.elo).sort((a,b)=>b-a);
    const pos = sorted.findIndex(e => e <= elo);
    const pct = (pos / sorted.length) * 100;
    if (pct <= 0.03) return {name:'Cosmic', color:'#8A00C4', bg:'rgba(138,0,196,0.2)', emoji:'⚫'};
    if (pct <= 1) return {name:'Prismatic', color:'#FF0080', bg:'rgba(255,0,128,0.2)', emoji:'⭕'};
    if (pct <= 6) return {name:'Brilliant', color:'#FFFF00', bg:'rgba(255,255,0,0.2)', emoji:'⭐'};
    if (pct <= 27.4) return {name:'Lustrous', color:'#BF00FF', bg:'rgba(191,0,255,0.2)', emoji:'🟣'};
    if (pct <= 65.57) return {name:'Refined', color:'#00BFFF', bg:'rgba(0,191,255,0.2)', emoji:'🔵'};
    return {name:'Faint', color:'#00FF7F', bg:'rgba(0,255,127,0.2)', emoji:'🟢'};
}

async function loadLeaderboard() {
    try {
        const res = await fetch('https://raw.githubusercontent.com/RoPotat0/Crystallized-Elo-System/main/elo-data.json?t=' + Date.now());
        const json = await res.json();
        allPlayers = json.players.sort((a, b) => b.elo - a.elo);
        document.getElementById('p-count').innerText = `${allPlayers.length} Total Players`;
        document.getElementById('last-update').innerText = json.lastUpdated ? `Last updated: ${json.lastUpdated}` : 'Recently updated';
        renderLeaderboard(allPlayers);
    } catch (err) { document.getElementById('lb-list').innerHTML = 'Error loading data.'; }
}

function renderLeaderboard(players) {
    const listEl = document.getElementById('lb-list');
    listEl.innerHTML = players.map((p, i) => {
        const rank = getRank(p.elo, allPlayers);
        const streak = p.streak > 0 ? `<span class="streak">🔥${p.streak}</span>` : '';
        return `<div class="lb-row" onclick="showProfile('${p.discordId}')">
            <div style="font-weight:bold; color:var(--text-dim);">#${allPlayers.indexOf(p)+1}</div>
            <div class="row-main"><img src="${p.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" class="avatar">
            <div class="name-container"><div class="lb-name">${p.name}</div>${streak}</div></div>
            <div style="text-align:right;"><div class="lb-elo">${p.elo}</div>
            <span class="lb-badge" style="background:${rank.bg}; color:${rank.color}; border:1px solid ${rank.color}40">${rank.emoji} ${rank.name}</span></div>
        </div>`;
    }).join('');
}

function filterLeaderboard() {
    const val = document.getElementById('search').value.toLowerCase();
    const filtered = allPlayers.filter(p => p.name.toLowerCase().includes(val));
    renderLeaderboard(filtered);
}

function showProfile(id) {
    const p = allPlayers.find(x => x.discordId === id);
    const rank = getRank(p.elo, allPlayers);
    document.getElementById('m-avatar').src = p.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png';
    document.getElementById('m-name').innerText = p.name;
    document.getElementById('m-username').innerText = `@${p.username || 'unknown'}`;
    document.getElementById('m-elo').innerText = p.elo;
    document.getElementById('m-rank').innerText = rank.name;
    document.getElementById('m-streak').innerText = p.streak || 0;
    document.getElementById('m-pos').innerText = `#${allPlayers.indexOf(p)+1}`;
    document.getElementById('profile-modal').style.display = 'flex';
}
function closeModal() { document.getElementById('profile-modal').style.display = 'none'; }
window.onload = loadLeaderboard;
</script>
</body>
</html>
